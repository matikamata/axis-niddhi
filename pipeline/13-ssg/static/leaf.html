<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Contemplação — Bodhi Circuit Leaf</title>
    <style>
        :root { --green-glow: #00ff00; }
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #0a1a0a 0%, #020502 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden; perspective: 1000px;
        }
        #particle-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1; pointer-events: none;
        }
        .scene { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; }
        .leaf-card { transform-style: preserve-3d; transition: transform 0.1s ease-out; }
        img {
            max-height: 80vh; max-width: 85vw;
            filter: drop-shadow(0 0 25px rgba(0, 255, 0, 0.4)) brightness(1.1);
            animation: cosmic-float 8s ease-in-out infinite;
            user-select: none;
        }
        @keyframes cosmic-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }
        .back-btn {
            position: fixed; bottom: 40px; z-index: 100;
            color: var(--green-glow); text-decoration: none;
            letter-spacing: 5px; font-family: monospace; font-size: 0.7rem;
            border: 1px solid rgba(0, 255, 0, 0.3); padding: 12px 25px;
            border-radius: 30px; background: rgba(0,0,0,0.6);
            transition: 0.3s;
        }
        .back-btn:hover { background: var(--green-glow); color: black; box-shadow: 0 0 20px var(--green-glow); }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="scene">
        <div class="leaf-card" id="card">
            <img src="assets/BodhiCircuitLeaf.png" alt="Dhamma Leaf HQ" id="leaf">
        </div>
    </div>
    <a href="index.html" class="back-btn">← VOLTAR AO SILÊNCIO</a>

    <script>
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<35; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 6 + 4,
                    speed: Math.random() * 0.4 + 0.2,
                    angle: Math.random() * Math.PI * 2,
                    spin: Math.random() * 0.02 - 0.01
                });
            }
        }

        function drawBodhiLeaf(ctx, x, y, size, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.beginPath();
            
            // VOLTAMOS AO CORAÇÃO QUE FUNCIONOU
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(size, -size, size * 1.5, size, 0, size * 2); 
            ctx.bezierCurveTo(-size * 1.5, size, -size, -size, 0, 0); 
            
            // DRIP-TIP: Apenas uma extensão sutil saindo do topo
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(size * 0.1, -size * 0.8, -size * 0.2, -size * 1.5);

            ctx.strokeStyle = "rgba(0, 255, 0, 0.5)";
            ctx.lineWidth = 1.5;
            ctx.shadowBlur = 5;
            ctx.shadowColor = "#00ff00";
            ctx.stroke();
            
            ctx.fillStyle = "rgba(0, 255, 0, 0.1)";
            ctx.fill();
            
            ctx.restore();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                drawBodhiLeaf(ctx, p.x, p.y, p.size, p.angle);
                p.y += p.speed;
                p.angle += p.spin;
                if(p.y > canvas.height + 40) {
                    p.y = -40;
                    p.x = Math.random() * canvas.width;
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
