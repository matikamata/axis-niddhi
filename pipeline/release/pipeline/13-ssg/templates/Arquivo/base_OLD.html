<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Brasileirinho{% endblock %}</title>
    
    <!-- Relative Path to CSS -->
    <link rel="stylesheet" href="{{ relative_root }}css/style.css">
    
    <style>
        /* Critical CSS for Layout Shift prevention */
        :root {
            --bg-color: #fdfbf7;
            --text-color: #2c2c2c;
            --accent-color: #8b4513;
        }
        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container">
            <h1><a href="{{ relative_root }}index.html">Brasileirinho</a></h1>
            <nav>
                <!-- Simple Global Nav -->
                <a href="{{ relative_root }}index.html">Home</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Dhamma Preservation Project. 2500 Years of Teaching.</p>
            <p><small>Generated Static Site. IPFS Compatible.</small></p>
        </div>
    </footer>

    <!-- Progressive Enhancement JS -->
    <script src="{{ relative_root }}js/main.js"></script>
</body>
</html>
