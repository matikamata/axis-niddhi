<!-- pipeline/13-ssg/templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Brasileirinho{% endblock %}</title>
    <link rel="stylesheet" href="{{ relative_root }}css/style.css">
    <link rel="stylesheet" href="{{ relative_root }}css/typography-pro.css"><!-- FF-011 -->

    <!-- [20260222] Service Worker: manifest PWA para instalabilidade futura -->
    <!-- Placeholder: adicionar manifest.json quando PWA for ativada -->
    <!-- <link rel="manifest" href="{{ relative_root }}manifest.json"> -->
</head>
<body>

    <main>
        <!-- Search UI (Sprint 9) -->
        <form id="search-form" role="search">
          <input 
            type="search"
            id="search-input"
            placeholder="Search..."
            aria-label="Search"
            autocomplete="off"
          />
        </form>
        <div id="search-results" hidden></div>

        {% block content %}{% endblock %}
        
        <footer>
            <p>Dhamma Preservation Project. 2500 Years of Teaching.</p>
            <p><small>Generated Static Site. IPFS Compatible.</small></p>
        </footer>
    </main>

    <!-- Progressive Enhancement JS -->
    <script src="{{ relative_root }}js/main.js"></script>
    <script src="{{ relative_root }}js/reading-flow.js"></script>

    <!-- [V2.4.0] Service Worker — DESATIVADO para User Edition offline -->
    <!-- SW causava conflito de cache em distribuição via pen drive -->
    <script>
      if (false && 'serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker
            .register('{{ relative_root }}sw.js', { scope: '{{ relative_root }}' })
            .then(function(reg) {
              console.log('[SW] Registered. Scope:', reg.scope);
            })
            .catch(function(err) {
              console.warn('[SW] Registration failed:', err);
            });
        });
      }
    </script>
</body>
</html>
