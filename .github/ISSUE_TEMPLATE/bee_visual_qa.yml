name: Bee Visual QA
description: Report a small visual, layout, print, or readability issue.
title: "[Bee Visual QA]: "
labels:
  - bee-task
  - ui
  - visual-qa
body:
  - type: input
    id: page_url
    attributes:
      label: Page URL
      placeholder: "https://niddhi.pages.dev/archive"
    validations:
      required: true
  - type: input
    id: browser_device
    attributes:
      label: Browser/device
      placeholder: "Example: Chrome on Android, Firefox desktop, iPhone Safari"
    validations:
      required: true
  - type: textarea
    id: what_happened
    attributes:
      label: What happened
      description: Describe the visual, layout, print, or readability issue.
    validations:
      required: true
  - type: textarea
    id: what_expected
    attributes:
      label: What expected
      description: What did you expect to see instead?
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot optional
      description: Drag a screenshot here if useful.
    validations:
      required: false
  - type: dropdown
    id: blocking_reading
    attributes:
      label: Is this blocking reading?
      options:
        - no
        - partially
        - yes
    validations:
      required: true
