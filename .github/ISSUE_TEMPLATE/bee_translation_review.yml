name: Bee Translation Review
description: Report a small English/Portuguese translation review finding.
title: "[Bee Translation Review]: "
labels:
  - bee-task
  - translation-review
  - review-content
body:
  - type: input
    id: article
    attributes:
      label: Article / PD#PN
      description: Article title or PD#PN code, if known.
      placeholder: "Example: TL.AA.000"
    validations:
      required: true
  - type: input
    id: article_url
    attributes:
      label: Article URL
      placeholder: "https://niddhi.pages.dev/pages/TL.AA.000/index.html"
    validations:
      required: true
  - type: input
    id: paragraph_section
    attributes:
      label: Paragraph or section reviewed
      placeholder: "Example: paragraph 3, heading '...'"
    validations:
      required: true
  - type: textarea
    id: english_excerpt
    attributes:
      label: English excerpt or reference
      description: Quote only the small phrase or sentence needed to identify the issue.
    validations:
      required: true
  - type: textarea
    id: portuguese_excerpt
    attributes:
      label: Portuguese excerpt or reference
      description: Quote only the small phrase or sentence needed to identify the issue.
    validations:
      required: false
  - type: textarea
    id: observation
    attributes:
      label: Observation
      description: What did you notice? Please report only what you can verify.
      placeholder: "The Portuguese may not preserve the English meaning because..."
    validations:
      required: true
  - type: dropdown
    id: suggested_status
    attributes:
      label: Suggested status
      options:
        - OK
        - needs review
        - unclear
    validations:
      required: true
  - type: input
    id: pali_terms
    attributes:
      label: Pāli/Dhamma terms involved
      placeholder: "Example: anicca, dukkha, saṅkhāra; or 'none'"
    validations:
      required: false
  - type: dropdown
    id: confidence
    attributes:
      label: Confidence level
      options:
        - low
        - medium
        - high
    validations:
      required: true
