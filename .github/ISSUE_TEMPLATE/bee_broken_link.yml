name: Bee Broken Link / Navigation
description: Report a broken link, confusing navigation, or unexpected routing behavior.
title: "[Bee Broken Link]: "
labels:
  - bee-task
  - navigation
  - bug
body:
  - type: input
    id: source_page_url
    attributes:
      label: Source page URL
      placeholder: "https://niddhi.pages.dev/contribute"
    validations:
      required: true
  - type: input
    id: link_clicked
    attributes:
      label: Link clicked
      placeholder: "Example: CONTRIBUTE, Open Archive, section card KD"
    validations:
      required: true
  - type: input
    id: expected_destination
    attributes:
      label: Expected destination
      placeholder: "Where did you expect it to go?"
    validations:
      required: true
  - type: input
    id: actual_destination
    attributes:
      label: Actual destination
      placeholder: "Where did it actually go?"
    validations:
      required: true
  - type: input
    id: browser_device
    attributes:
      label: Browser/device
      placeholder: "Example: Chrome desktop, Firefox, iPhone Safari"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add anything else that helps reproduce the issue.
    validations:
      required: false
